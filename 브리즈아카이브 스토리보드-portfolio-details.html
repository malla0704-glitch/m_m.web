<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design - Breeze Archive</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "SUIT", sans-serif;
      background: #f8f8f5;
      color: #000000; /* 전체 텍스트 진하게 조정 */
    }

    /* 왼쪽 상단 돌아가기 버튼 */
    .btn-back {
      position: fixed;
      top: 20px;
      left: 20px;
      background: #000000;
      color: #ffffff;
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      z-index: 1000;
    }

    .btn-back:hover {
      opacity: 0.85;
    }

    /* 모바일 대응 */
    @media (max-width: 600px) {
      .btn-back {
        top: 10px;
        left: 10px;
        padding: 8px 14px;
        font-size: 14px;
      }
    }

    .detail-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .detail-container img {
      width: 100%;
      display: block;
      margin-bottom: 40px;
      border-radius: 4px;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 10px;
      text-align: center;
      color: #000000;
      font-weight: 700;
    }

    p {
      text-align: center;
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 32px;
      color: #000000;
      font-weight: 500;
    }

    .tools-section {
      text-align: center;
      margin-bottom: 40px;
    }

    .tools-section h3 {
      font-size: 18px;
      font-weight: 700;
      color: #000000;
      margin-bottom: 12px;
    }

    .tools-icons {
      display: inline-flex;
      justify-content: center;
      align-items: center;
    }

    .tools-icons img {
      width: 42px;
      height: 42px;
      margin: 0 12px;
      filter: drop-shadow(0px 1px 2px rgba(0,0,0,0.15));
    }
  </style>
</head>

<body>

  <!-- 왼쪽 상단 돌아가기 버튼 -->
  <a href="../index.html" class="btn-back">← 돌아가기</a>

  <div class="detail-container">

    <h1>Breeze Archive</h1>
    <p>“The space where scent stays”</p>

    <div class="tools-section">
      <h3>Tools Used - AE, FM</h3>
      <div class="tools-icons">
        <img src="./assets/img/어도비 아이콘 모음/after-effects.png" alt="After Effects">
        <img src="./assets/img/어도비 아이콘 모음/figma.png" alt="Figma">
      </div>
    </div>

    <img src="./assets/img/브리즈아카이브/브리즈아카이브 포스터.png" alt="Branding Main Image">
    <img src="./assets/img/브리즈아카이브/제품 촬영 스토리보드.png" alt="">

  </div>

</body>
</html>
