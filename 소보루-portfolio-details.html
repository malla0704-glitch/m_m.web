<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Character Design 1 - SOBORU</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "SUIT", sans-serif;
      background: #f8f8f5;
      color: #F8F4EA;
    }

    .detail-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .detail-container img {
      width: 100%;
      display: block;
      margin-bottom: 40px;
      border-radius: 4px;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 10px;
      text-align: center;
      color: #60360f;
    }

    p {
      text-align: center;
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 40px;
      color: #60360f;
    }
    .tools-section {
      text-align: center;
      margin-top: 10px;
      margin-bottom: 40px;
    }

    .tools-icons {
      display: inline-flex;
      justify-content: center;
      align-items: center;
    }

    .tools-icons img {
      width: 38px;
      height: 38px;
      margin: 0 10px;
      filter: drop-shadow(0px 1px 1px rgba(0,0,0,0.08));
    }


    a.back {
      display: block;
      text-align: center;
      margin-top: 30px;
      text-decoration: none;
      color: #F8F4EA;
      font-weight: 600;
      font-size: 16px;
    }

    a.back:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="detail-container">

    <h1>SOBORU</h1>
    <p>“따뜻한 향과 바삭한 포근함을 품은 작은 베이커리 친구, 소보루.
        동글동글한 겉모습과 달콤한 마음씨를 가진 소보루는
        누구의 하루든 살짝 더 부드럽고 기분 좋게 만들어주는 귀여운 베이킹 캐릭터입니다.”</p>
     <br>
    <div class="tools-section">
      <h3>Tools Used - AI,FM</h3>
      <div class="tools-icons">
        <img src="./assets/img/어도비 아이콘 모음/illustrator.png" alt="Premiere Pro">
        <img src="./assets/img/어도비 아이콘 모음/figma.png" alt="Premiere Pro">
      </div>
    </div>

    <!-- 전체 상세 이미지 넣는 곳 -->
    <!-- ↓↓↓ 여기에 원하는 이미지 계속 추가 가능 ↓↓↓ -->

    <img src="./assets/img/소보루/소보루.png" alt=" Branding Main Image">
    <br>
    <br>
    <img src="./assets/img/소보루/소보루 소개.png" alt="">
  

    <!-- ↑↑↑ 필요하면 이미지 더 추가 가능 ↑↑↑ -->

    <a href="../index.html" class="back">← 포트폴리오로 돌아가기</a>

  </div>

</body>
</html>
