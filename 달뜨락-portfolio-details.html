<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Branding Design - 달뜨락</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "SUIT", sans-serif;
      background: #f8f8f5;
      color: #473a17;
    }

    /* 왼쪽 상단 돌아가기 버튼 */
    .btn-back {
      position: fixed;
      top: 20px;
      left: 20px;
      background: #c2a36f;
      color: white;
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      z-index: 1000;
    }

    .btn-back:hover {
      opacity: 0.9;
    }

    /* 모바일 대응 */
    @media (max-width: 600px) {
      .btn-back {
        top: 10px;
        left: 10px;
        padding: 8px 14px;
        font-size: 14px;
      }
    }

    .detail-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .detail-container img {
      width: 100%;
      display: block;
      margin-bottom: 40px;
      border-radius: 4px;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 10px;
      text-align: center;
      color: #473a17;
    }

    p {
      text-align: center;
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 40px;
      color: #000000;
    }

    .tools-section {
      text-align: center;
      margin-top: 10px;
      margin-bottom: 40px;
    }

    .tools-icons {
      display: inline-flex;
      justify-content: center;
      align-items: center;
    }

    .tools-icons img {
      width: 38px;
      height: 38px;
      margin: 0 10px;
      filter: drop-shadow(0px 1px 1px rgba(0,0,0,0.08));
    }

  </style>
</head>

<body>

  <!-- 왼쪽 상단 돌아가기 버튼 -->
  <a href="../index.html" class="btn-back">← 돌아가기</a>

  <div class="detail-container">

    <h1>달뜨락</h1>
    <p>
      “한식의 정수를 감각적으로 풀어내는 공간”<br>
      A space that sensibly unravels <br>
      the essence of Korean food
    </p>

    <br>
    <div class="tools-section">
      <h3>Tools Used - AI, FM</h3>
      <div class="tools-icons">
        <img src="./assets/img/어도비 아이콘 모음/illustrator.png" alt="Illustrator">
        <img src="./assets/img/어도비 아이콘 모음/figma.png" alt="Figma">
      </div>
    </div>

    <img src="./assets/img/달뜨락/로고.png" alt="달뜨락 Branding Main Image">
    <img src="./assets/img/달뜨락/로고소개.png" alt="">

  </div>

</body>
</html>
